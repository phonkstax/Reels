name: Phonkstax Reel Engine

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq bc
          # Install the latest master version of yt-dlp
          python3 -m pip install -U https://github.com/yt-dlp/yt-dlp/archive/master.tar.gz requests --break-system-packages
     
      - name: Check & Download
        id: check
        env:
          YTM_CLIENT_ID: ${{ secrets.YTM_CLIENT_ID }}
          YTM_CLIENT_SECRET: ${{ secrets.YTM_CLIENT_SECRET }}
          YTM_OAUTH_JSON: ${{ secrets.YTM_OAUTH_JSON }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python check_and_process.py

      - name: Render
        if: steps.check.outputs.exists == 'false'
        run: |
          chmod +x render_reel.sh
          ./render_reel.sh

      - name: Artifact
        if: steps.check.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.check.outputs.title }}
          path: output.mp4
