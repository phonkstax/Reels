name: Reels Automation - Daily Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight

jobs:
  run-logic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Execute Check Script
        id: logic
        env:
          YTM_CLIENT_ID: ${{ secrets.YTM_CLIENT_ID }}
          YTM_CLIENT_SECRET: ${{ secrets.YTM_CLIENT_SECRET }}
          YTM_OAUTH_JSON: ${{ secrets.YTM_OAUTH_JSON }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python check_and_process.py

      - name: Handle New Video
        if: steps.logic.outputs.exists == 'false'
        run: |
          echo "Processing: ${{ steps.logic.outputs.title }}"
          echo "Video ID: ${{ steps.logic.outputs.video_id }}"
          # Trigger your render or posting workflow here
