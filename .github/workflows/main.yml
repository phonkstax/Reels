name: Phonk Reel Automation

on:
  workflow_dispatch: # Manual trigger

jobs:
  render-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ADD THIS STEP HERE
      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Step 1 - Notion & Playlist Check
        env:
          YTM_CLIENT_ID: ${{ secrets.YTM_CLIENT_ID }}
          YTM_CLIENT_SECRET: ${{ secrets.YTM_CLIENT_SECRET }}
          YTM_OAUTH_JSON: ${{ secrets.YTM_OAUTH_JSON }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python 1_Notion_check.py
        

      - name: 🛠️ Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq bc
          # INSTALL RCLONE
          sudo -v && curl https://rclone.org/install.sh | sudo bash

      - name: ⚙️ Setup Rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf

      - name: 📥 Step 2 - Download & Cleanup Assets
        env:
          # This creates the 'mypikpak' remote inside the runner's memory
          RCLONE_CONFIG_MYPIKPAK_TYPE: pikpak
          RCLONE_CONFIG_MYPIKPAK_USER: ${{ secrets.PIKPAK_USER }}
          RCLONE_CONFIG_MYPIKPAK_PASS: ${{ secrets.PIKPAK_PASS }}
        run: |
          # rclone will now find 'mypikpak'
          python 2_download_video.py

      - name: 🔪 Step 3 - Split Audio & Image
        run: bash 3_audio_image_splitter.sh

      - name: 🔉 Step 3.5 - Extract Best Part
        run: python 3.5_trim_audio.py

      - name: 🎬 Step 4 - Render & Webhook
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          # 1. CLEAN OUTPUT FOLDER: Ensure no old renders exist
          rm -rf output/
          mkdir -p output/
          
          # 2. RUN RENDER: This will create the new artist_-_track.mp4
          bash 4_output.sh

      - name: 📦 Archive Final Video (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: generated-reels
          path: output/
